<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Railway Control — bigtrainset.com</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<script src="https://bigtrainset.com/socket.io/socket.io.js"></script>
<style>
/* ── Reset & root ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --stud: 28px;
  --panel-bg: #c8c0b2;
  --panel-border: #9a9080;
  --brick-dark: #1a2535;
  --brick-mid: #2e3f56;
  --accent-blue: #1f5fa6;
  --accent-gold: #f0b429;
  --accent-red: #c0392b;
  --accent-green: #27ae60;
  --stud-hi: rgba(255,255,255,0.45);
  --stud-sh: rgba(0,0,0,0.35);
  --page-bg: #080e18;
}
html, body { min-height: 100%; background: var(--page-bg); color: #fff; font-family: 'Share Tech Mono', monospace; overflow-x: hidden; }
body::before { content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none; background-image: radial-gradient(circle, rgba(31,95,166,0.18) 1px, transparent 1px); background-size: 32px 32px; animation: bgdrift 40s linear infinite; }
@keyframes bgdrift { to { background-position: 32px 32px; } }

/* ── Top bar ── */
.topbar { position: relative; z-index: 10; display: flex; align-items: center; justify-content: space-between; padding: 12px 24px; background: rgba(10,16,28,0.92); border-bottom: 1px solid rgba(240,180,41,0.2); backdrop-filter: blur(8px); }
.topbar-logo { font-family: 'Orbitron', sans-serif; font-size: 14px; font-weight: 900; letter-spacing: 4px; color: var(--accent-gold); text-shadow: 0 0 20px rgba(240,180,41,0.4); display: flex; align-items: center; gap: 10px; }
.topbar-logo::before { content: ''; display: inline-block; width: 10px; height: 10px; border-radius: 50%; background: var(--accent-gold); box-shadow: 0 0 12px rgba(240,180,41,0.9); animation: pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.6;transform:scale(0.85)} }
.topbar-stats { display: flex; gap: 20px; align-items: center; }
.stat-pill { font-size: 10px; letter-spacing: 1px; color: rgba(255,255,255,0.5); display: flex; align-items: center; gap: 6px; }
.stat-pill strong { color: #fff; font-size: 12px; }
.stat-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent-green); box-shadow: 0 0 8px rgba(39,174,96,0.8); animation: pulse 1.8s ease-in-out infinite; }
.stat-dot.amber { background: var(--accent-gold); box-shadow: 0 0 8px rgba(240,180,41,0.8); }

/* ── Page ── */
.page { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; padding: 20px 16px 40px; gap: 16px; max-width: 900px; margin: 0 auto; }
.page > * { opacity: 0; transform: translateY(12px); animation: fadeUp 0.5s ease forwards; }
.page > *:nth-child(1) { animation-delay: 0.05s; }
.page > *:nth-child(2) { animation-delay: 0.15s; }
.page > *:nth-child(3) { animation-delay: 0.28s; }
@keyframes fadeUp { to { opacity: 1; transform: none; } }

/* ── Stud texture ── */
.studs { position: absolute; inset: 0; pointer-events: none; overflow: hidden; border-radius: inherit; background-image: radial-gradient(circle 5px at 14px 14px, var(--stud-hi) 40%, transparent 70%), radial-gradient(circle 5px at 14px 14px, var(--stud-sh) 60%, transparent 80%); background-size: var(--stud) var(--stud); opacity: 0.5; z-index: 0; }

/* ── Camera row ── */
.cam-row { display: flex; gap: 12px; width: 100%; }
.cam-tile { flex: 1; position: relative; border-radius: 12px; overflow: hidden; background: #050b14; box-shadow: 0 4px 0 rgba(0,0,0,0.6), 0 0 0 3px #1a2535; }
.cam-stud-strip { height: 22px; background: var(--panel-bg); background-image: radial-gradient(circle 4px at 14px 11px, var(--stud-hi) 40%, transparent 70%), radial-gradient(circle 4px at 14px 11px, var(--stud-sh) 60%, transparent 80%); background-size: 28px 22px; }
.cam-viewport { position: relative; width: 100%; aspect-ratio: 16/9; background: #030810; overflow: hidden; }
.cam-viewport img { width: 100%; height: 100%; object-fit: cover; display: block; }
.cam-viewport::after { content: ''; position: absolute; inset: 0; pointer-events: none; background: radial-gradient(ellipse at 50% 50%, transparent 50%, rgba(0,0,0,0.7) 100%); }
.scanlines { position: absolute; inset: 0; pointer-events: none; background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.15) 2px, rgba(0,0,0,0.15) 3px); }
.cam-label { position: absolute; top: 28px; left: 10px; z-index: 5; font-family: 'Orbitron', sans-serif; font-size: 9px; letter-spacing: 2px; color: rgba(255,255,255,0.6); text-transform: uppercase; background: rgba(0,0,0,0.55); padding: 2px 8px; border-radius: 4px; }
.cam-live { position: absolute; top: 30px; right: 10px; z-index: 5; display: flex; align-items: center; gap: 5px; font-family: 'Orbitron', sans-serif; font-size: 8px; letter-spacing: 1px; color: #e74c3c; }
.live-dot { width: 8px; height: 8px; border-radius: 50%; background: #e74c3c; box-shadow: 0 0 6px rgba(231,76,60,0.9); animation: blink 1.2s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.15} }
.cam-bottom { height: 20px; background: #1a2535; display: flex; align-items: center; justify-content: space-between; padding: 0 10px; }
.cam-bottom span { font-size: 9px; color: rgba(255,255,255,0.35); letter-spacing: 1px; }
.no-signal { position: absolute; inset: 0; z-index: 6; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; background: #030810; transition: opacity 0.5s; }
.ns-bars { display: flex; gap: 3px; align-items: flex-end; height: 28px; }
.ns-bars div { width: 5px; border-radius: 2px; background: rgba(255,255,255,0.12); }
.no-signal span { font-family: 'Orbitron', sans-serif; font-size: 9px; letter-spacing: 2px; color: rgba(255,255,255,0.2); }

/* ── Control panel ── */
.panel { position: relative; width: 100%; background: var(--panel-bg); border-radius: 16px; padding: 16px; box-shadow: 0 2px 0 #fff inset, 0 -3px 0 rgba(0,0,0,0.3) inset, 0 24px 60px rgba(0,0,0,0.7), 0 0 0 3px var(--panel-border); }
.panel::before { content: ''; position: absolute; inset: 0; border-radius: 16px; pointer-events: none; background: repeating-linear-gradient(0deg, transparent, transparent 27px, rgba(0,0,0,0.04) 27px, rgba(0,0,0,0.04) 28px), repeating-linear-gradient(90deg, transparent, transparent 27px, rgba(0,0,0,0.04) 27px, rgba(0,0,0,0.04) 28px); }
.tile { position: relative; border-radius: 10px; padding: 12px; z-index: 1; }
.tile-dark { background: var(--brick-dark); box-shadow: 0 3px 0 rgba(0,0,0,0.5), 0 1px 0 rgba(255,255,255,0.07) inset; }
.tile-blue { background: var(--accent-blue); box-shadow: 0 3px 0 rgba(0,0,0,0.4), 0 1px 0 rgba(255,255,255,0.15) inset; }
.tile-mid  { background: var(--brick-mid);  box-shadow: 0 3px 0 rgba(0,0,0,0.4), 0 1px 0 rgba(255,255,255,0.1) inset; }
.row { display: flex; gap: 10px; margin-bottom: 10px; position: relative; z-index: 1; }
.row:last-child { margin-bottom: 0; }
.lbl { font-family: 'Orbitron', sans-serif; font-size: 8px; letter-spacing: 2px; color: rgba(255,255,255,0.45); text-transform: uppercase; margin-bottom: 4px; }
.header-strip { position: relative; z-index: 1; background: var(--accent-gold); border-radius: 8px; padding: 8px 16px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; box-shadow: 0 3px 0 rgba(0,0,0,0.3), 0 1px 0 rgba(255,255,255,0.4) inset; }
.header-strip::before, .header-strip::after { content: ''; display: block; width: 18px; height: 18px; border-radius: 50%; flex-shrink: 0; background: linear-gradient(145deg, rgba(255,255,255,0.6) 0%, transparent 60%), #d4960a; box-shadow: 0 2px 0 rgba(0,0,0,0.3), inset 0 1px 2px rgba(255,255,255,0.5); }
.header-title { font-family: 'Orbitron', sans-serif; font-size: 13px; font-weight: 900; letter-spacing: 4px; color: #3d2600; text-transform: uppercase; }

/* ── Dial ── */
.dial-wrap { width: 120px; height: 120px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.dial-outer { width: 116px; height: 116px; border-radius: 50%; background: radial-gradient(circle at 38% 35%, #3a3a3a, #111); box-shadow: 0 6px 0 rgba(0,0,0,0.6), 0 0 0 4px #555, 0 0 0 6px #333, inset 0 2px 4px rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; position: relative; cursor: grab; }
.dial-outer::before { content: ''; position: absolute; inset: 6px; border-radius: 50%; background: repeating-conic-gradient(transparent 0deg, transparent 10deg, rgba(255,255,255,0.1) 10deg, rgba(255,255,255,0.1) 11deg); }
.dial-inner { width: 52px; height: 52px; border-radius: 50%; background: radial-gradient(circle at 40% 38%, #6b7a8d, #2a3545); box-shadow: 0 3px 0 rgba(0,0,0,0.5), 0 0 0 3px #1a2535, inset 0 2px 3px rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; }
.dial-pip { width: 12px; height: 12px; border-radius: 50%; background: radial-gradient(circle at 40% 35%, #5af, #1a6fb0); box-shadow: 0 0 8px rgba(80,160,255,0.8); }
.speed-readout { font-family: 'Orbitron', sans-serif; font-size: 30px; font-weight: 900; color: #fff; line-height: 1; }
.speed-readout sup { font-size: 10px; color: rgba(255,255,255,0.4); margin-left: 3px; vertical-align: super; }
.speed-track { position: relative; height: 14px; border-radius: 7px; background: #0d1520; box-shadow: inset 0 2px 4px rgba(0,0,0,0.6); overflow: hidden; cursor: pointer; margin-top: 4px; }
.speed-fill { height: 100%; border-radius: 7px; background: linear-gradient(90deg, #1a6fb0, #5af, #aef); box-shadow: 0 0 14px rgba(80,180,255,0.5); transition: width 0.12s ease; width: 0%; }
input[type=range].slider { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
.leds { display: flex; gap: 4px; margin-top: 5px; }
.led { width: 13px; height: 13px; border-radius: 50%; background: #0d1520; box-shadow: inset 0 1px 3px rgba(0,0,0,0.6); transition: background 0.12s, box-shadow 0.12s; }
.led.on { background: radial-gradient(circle at 38% 35%, #7ee8fa, #1a9bd0); box-shadow: 0 0 7px rgba(80,200,255,0.9); }
.status-row { display: flex; align-items: center; gap: 8px; margin-top: 6px; }
.status-light { width: 16px; height: 16px; border-radius: 50%; flex-shrink: 0; background: #111; box-shadow: inset 0 2px 4px rgba(0,0,0,0.8); transition: background 0.3s, box-shadow 0.3s; }
.status-light.green { background: radial-gradient(circle at 38% 35%, #6ef, #27ae60); box-shadow: 0 0 10px rgba(39,200,96,0.9); }
.status-light.amber { background: radial-gradient(circle at 38% 35%, #ffe, #f0b429); box-shadow: 0 0 10px rgba(240,180,41,0.8); }
.status-light.red   { background: radial-gradient(circle at 38% 35%, #faa, #c0392b); box-shadow: 0 0 10px rgba(200,60,40,0.9); }
.status-text { font-size: 9px; color: rgba(255,255,255,0.55); letter-spacing: 1px; }
.queue-badge { background: var(--accent-gold); color: #3d2600; font-family: 'Orbitron', sans-serif; font-size: 8px; font-weight: 700; padding: 2px 8px; border-radius: 4px; letter-spacing: 1px; box-shadow: 0 2px 0 rgba(0,0,0,0.3); margin-left: auto; }
.dir-btn { flex: 1; height: 50px; border-radius: 8px; border: none; cursor: pointer; font-family: 'Orbitron', sans-serif; font-size: 10px; letter-spacing: 2px; font-weight: 700; text-transform: uppercase; color: #fff; background: var(--brick-mid); box-shadow: 0 4px 0 rgba(0,0,0,0.5), 0 1px 0 rgba(255,255,255,0.1) inset; transition: transform 0.08s, box-shadow 0.08s; position: relative; }
.dir-btn::before { content: ''; position: absolute; top: 5px; left: 50%; transform: translateX(-50%); width: 18px; height: 4px; border-radius: 3px; background: rgba(255,255,255,0.18); }
.dir-btn:not(:disabled):active { transform: translateY(3px); box-shadow: 0 1px 0 rgba(0,0,0,0.5); }
.dir-btn.fwd { background: var(--accent-blue); }
.dir-btn.rev { background: #3a2060; }
.dir-btn.active-dir { background: var(--accent-green) !important; box-shadow: 0 4px 0 #155c30, 0 0 14px rgba(39,174,96,0.4); }
.dir-btn:disabled { opacity: 0.45; cursor: not-allowed; }
.timer-display { font-family: 'Orbitron', sans-serif; font-size: 22px; font-weight: 900; color: var(--accent-gold); text-shadow: 0 0 12px rgba(240,180,41,0.5); letter-spacing: 3px; text-align: center; margin-top: 4px; transition: color 0.3s; }
.timer-display.warn { color: var(--accent-red); text-shadow: 0 0 12px rgba(200,60,40,0.6); }
.fn-btn { flex: 1; height: 40px; border: none; border-radius: 7px; cursor: pointer; font-size: 16px; color: #fff; background: var(--brick-mid); box-shadow: 0 3px 0 rgba(0,0,0,0.4), 0 1px 0 rgba(255,255,255,0.08) inset; transition: transform 0.08s, box-shadow 0.08s, background 0.15s; }
.fn-btn:not(:disabled):active { transform: translateY(2px); box-shadow: 0 1px 0 rgba(0,0,0,0.4); }
.fn-btn.lit { background: #8b6914; box-shadow: 0 3px 0 #4a3800, 0 0 10px rgba(240,180,41,0.45); }
.fn-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.estop-btn { width: 100%; height: 56px; border: none; border-radius: 10px; cursor: pointer; background: radial-gradient(ellipse at 50% 30%, #e74c3c, #8b1a1a); box-shadow: 0 5px 0 #5a0f0f, 0 1px 0 rgba(255,255,255,0.2) inset, 0 0 22px rgba(231,76,60,0.25); font-family: 'Orbitron', sans-serif; font-size: 12px; letter-spacing: 4px; font-weight: 900; color: #fff; transition: transform 0.08s, box-shadow 0.08s; position: relative; }
.estop-btn::before { content: ''; position: absolute; top: 6px; left: 50%; transform: translateX(-50%); width: 40px; height: 4px; border-radius: 3px; background: rgba(255,255,255,0.22); }
.estop-btn:active { transform: translateY(4px); box-shadow: 0 1px 0 #5a0f0f; }
.inactive-overlay { position: absolute; inset: 0; z-index: 20; border-radius: 16px; background: rgba(5,10,20,0.72); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; backdrop-filter: blur(3px); transition: opacity 0.4s; }
.inactive-overlay.hidden { opacity: 0; pointer-events: none; }
.inactive-overlay .io-title { font-family: 'Orbitron', sans-serif; font-size: 12px; letter-spacing: 3px; color: rgba(255,255,255,0.7); text-transform: uppercase; }
.inactive-overlay .io-pos { font-family: 'Orbitron', sans-serif; font-size: 28px; font-weight: 900; color: var(--accent-gold); text-shadow: 0 0 20px rgba(240,180,41,0.5); }
.inactive-overlay .io-sub { font-size: 10px; color: rgba(255,255,255,0.4); letter-spacing: 1px; }

/* ── Queue bar ── */
.queue-panel { background: rgba(26,37,53,0.9); border: 1px solid rgba(240,180,41,0.15); border-radius: 12px; padding: 14px 16px; display: flex; align-items: center; gap: 16px; backdrop-filter: blur(6px); width: 100%; }
.queue-label { font-family: 'Orbitron', sans-serif; font-size: 9px; letter-spacing: 3px; color: rgba(255,255,255,0.35); text-transform: uppercase; white-space: nowrap; }
.queue-slots { display: flex; gap: 6px; flex-wrap: wrap; flex: 1; }
.q-slot { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-family: 'Orbitron', sans-serif; font-size: 10px; font-weight: 700; transition: all 0.3s; }
.q-slot.active { background: var(--accent-green); color: #fff; box-shadow: 0 0 14px rgba(39,174,96,0.5), 0 3px 0 #155c30; }
.q-slot.waiting { background: var(--brick-mid); color: rgba(255,255,255,0.5); box-shadow: 0 2px 0 rgba(0,0,0,0.4); }
.q-slot.you { background: var(--accent-blue); color: #fff; box-shadow: 0 0 12px rgba(31,95,166,0.5), 0 3px 0 rgba(0,0,0,0.4); animation: youPulse 2s ease-in-out infinite; }
@keyframes youPulse { 0%,100%{box-shadow:0 0 12px rgba(31,95,166,0.5),0 3px 0 rgba(0,0,0,0.4)} 50%{box-shadow:0 0 22px rgba(31,95,166,0.8),0 3px 0 rgba(0,0,0,0.4)} }
.queue-next-text { font-size: 10px; color: rgba(255,255,255,0.4); letter-spacing: 1px; white-space: nowrap; }

/* ── Toast ── */
.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: #1a2535; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 10px 20px; font-family: 'Orbitron', sans-serif; font-size: 10px; letter-spacing: 2px; color: rgba(255,255,255,0.7); box-shadow: 0 8px 32px rgba(0,0,0,0.5); transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1); z-index: 999; white-space: nowrap; }
.toast.show { transform: translateX(-50%) translateY(0); }

@media (max-width: 600px) {
  .topbar-stats { display: none; }
  .header-title { font-size: 10px; letter-spacing: 2px; }
  .speed-readout { font-size: 22px; }
  .timer-display { font-size: 18px; }
  .dial-wrap { width: 96px; height: 96px; }
  .dial-outer { width: 92px; height: 92px; }
}
</style>
</head>
<body>

<!-- ── Top bar ── -->
<nav class="topbar">
  <div class="topbar-logo">bigtrainset.com</div>
  <div class="topbar-stats">
    <div class="stat-pill"><div class="stat-dot"></div> LIVE <strong id="viewerCount">--</strong> viewer(s)</div>
    <div class="stat-pill"><div class="stat-dot amber"></div> QUEUE <strong id="queueCount">--</strong></div>
    <div class="stat-pill">PING <strong id="pingMs">--</strong>ms</div>
  </div>
</nav>

<main class="page">

  <!-- ── Cameras ── -->
  <div class="cam-row">

    <!-- Cam 1 placeholder (add your second camera here later) -->
    <div class="cam-tile">
      <div class="cam-stud-strip"></div>
      <div class="cam-viewport">
        <div class="no-signal" id="ns1">
          <div class="ns-bars">
            <div style="height:7px"></div><div style="height:13px"></div>
            <div style="height:22px"></div><div style="height:15px"></div><div style="height:9px"></div>
          </div>
          <span>No signal</span>
        </div>
        <div class="scanlines"></div>
      </div>
      <div class="cam-label">CAM 1 — Overview</div>
      <div class="cam-live"><div class="live-dot"></div>LIVE</div>
      <div class="cam-bottom"><span>OVERHEAD</span><span id="tc1">--:--:--</span></div>
    </div>

    <!-- Cam 2 — fed via Socket.io from Pi -->
    <div class="cam-tile">
      <div class="cam-stud-strip"></div>
      <div class="cam-viewport">
        <div class="no-signal" id="ns2">
          <div class="ns-bars">
            <div style="height:7px"></div><div style="height:13px"></div>
            <div style="height:22px"></div><div style="height:15px"></div><div style="height:9px"></div>
          </div>
          <span>Connecting...</span>
        </div>
        <img id="cam2feed"
             style="width:100%;height:100%;object-fit:cover;display:block;position:absolute;top:0;left:0;">
        <div class="scanlines"></div>
      </div>
      <div class="cam-label">CAM 2 — Trackside</div>
      <div class="cam-live"><div class="live-dot"></div>LIVE</div>
      <div class="cam-bottom"><span>LINESIDE</span><span id="tc2">--:--:--</span></div>
    </div>

  </div>

  <!-- ── Control panel ── -->
  <div class="panel" id="mainPanel">
    <div class="studs"></div>

    <div class="header-strip">
      <div></div>
      <div class="header-title">Railway Control</div>
      <div></div>
    </div>

    <!-- Row 1: Dial + Speed -->
    <div class="row">
      <div class="tile tile-dark" style="display:flex;align-items:center;justify-content:center;padding:8px;">
        <div class="dial-wrap">
          <div class="dial-outer" id="dialOuter">
            <div class="dial-inner"><div class="dial-pip"></div></div>
          </div>
        </div>
      </div>
      <div class="tile tile-dark" style="flex:1;display:flex;flex-direction:column;gap:4px;">
        <div class="lbl">Throttle</div>
        <div class="speed-readout" id="speedReadout">000<sup>km/h</sup></div>
        <div class="speed-track">
          <div class="speed-fill" id="speedFill"></div>
          <input type="range" class="slider" id="speedSlider" min="0" max="100" value="0">
        </div>
        <div class="leds" id="ledRow"></div>
        <div class="status-row">
          <div class="status-light amber" id="connLight"></div>
          <div class="status-text" id="connText">CONNECTING</div>
          <div class="queue-badge" id="queueBadge">QUEUE: --</div>
        </div>
      </div>
    </div>

    <!-- Row 2: Direction -->
    <div class="row">
      <button class="dir-btn fwd active-dir" id="btnFwd" disabled>▶▶ Forward</button>
      <button class="dir-btn rev" id="btnRev" disabled>◀◀ Reverse</button>
    </div>

    <!-- Row 3: Timer + Functions -->
    <div class="row">
      <div class="tile tile-blue" style="flex:1;text-align:center;">
        <div class="lbl">Drive slot</div>
        <div class="timer-display" id="timerDisplay">01:00</div>
      </div>
      <div class="tile tile-mid" style="flex:1;display:flex;flex-direction:column;gap:5px;">
        <div class="lbl">Functions</div>
        <div style="display:flex;gap:6px;">
          <button class="fn-btn" id="hornBtn" disabled title="Horn">📯</button>
          <button class="fn-btn" id="lightsBtn" disabled title="Lights">💡</button>
        </div>
      </div>
    </div>

    <!-- Row 4: E-Stop -->
    <div class="row" style="margin-top:2px;">
      <button class="estop-btn" id="estopBtn">⬛ Emergency Stop</button>
    </div>

    <!-- Inactive overlay -->
    <div class="inactive-overlay" id="inactiveOverlay">
      <div class="io-title">Waiting for your turn</div>
      <div class="io-pos" id="queuePos">—</div>
      <div class="io-sub" id="queueEta">Connecting…</div>
    </div>
  </div>

  <!-- ── Queue bar ── -->
  <div class="queue-panel">
    <div class="queue-label">Queue</div>
    <div class="queue-slots" id="queueSlots"></div>
    <div class="queue-next-text" id="queueNextText">—</div>
  </div>

</main>

<div class="toast" id="toast"></div>

<script>
// ── Socket.io connection ──────────────────────────────────────
const socket = io('https://bigtrainset.com');

// ── State ─────────────────────────────────────────────────────
let speed       = 0;
let direction   = 'fwd';
let lightsOn    = false;
let isActive    = false;
let timerSecs   = 60;
let timerIv     = null;

// ── DOM refs ──────────────────────────────────────────────────
const speedSlider    = document.getElementById('speedSlider');
const speedFill      = document.getElementById('speedFill');
const speedReadout   = document.getElementById('speedReadout');
const ledRow         = document.getElementById('ledRow');
const timerDisplay   = document.getElementById('timerDisplay');
const connLight      = document.getElementById('connLight');
const connText       = document.getElementById('connText');
const queueBadge     = document.getElementById('queueBadge');
const btnFwd         = document.getElementById('btnFwd');
const btnRev         = document.getElementById('btnRev');
const estopBtn       = document.getElementById('estopBtn');
const hornBtn        = document.getElementById('hornBtn');
const lightsBtn      = document.getElementById('lightsBtn');
const inactiveOverlay= document.getElementById('inactiveOverlay');
const queuePos       = document.getElementById('queuePos');
const queueEta       = document.getElementById('queueEta');
const queueSlots     = document.getElementById('queueSlots');
const queueNextText  = document.getElementById('queueNextText');
const dialOuter      = document.getElementById('dialOuter');
const toastEl        = document.getElementById('toast');
const viewerCount    = document.getElementById('viewerCount');
const queueCount     = document.getElementById('queueCount');
const pingEl         = document.getElementById('pingMs');
const cam2feed       = document.getElementById('cam2feed');
const ns2            = document.getElementById('ns2');

// Build LEDs
for (let i = 0; i < 10; i++) {
  const d = document.createElement('div');
  d.className = 'led'; d.id = 'led' + i;
  ledRow.appendChild(d);
}

// ── Speed update ──────────────────────────────────────────────
function updateSpeed(v, emit = true) {
  speed = Math.max(0, Math.min(100, Math.round(v)));
  speedSlider.value = speed;
  speedFill.style.width = speed + '%';
  speedReadout.innerHTML = String(speed).padStart(3, '0') + '<sup>km/h</sup>';
  const lit = Math.round(speed / 10);
  for (let i = 0; i < 10; i++) document.getElementById('led' + i).classList.toggle('on', i < lit);
  const deg = (speed / 100) * 270 - 135;
  dialOuter.style.transform = `rotate(${deg}deg)`;
  if (emit) socket.emit('train:control', { speed, direction });
}

// ── Direction ─────────────────────────────────────────────────
function setDirection(dir) {
  direction = dir;
  btnFwd.classList.toggle('active-dir', dir === 'fwd');
  btnRev.classList.toggle('active-dir', dir === 'rev');
}

// ── Active/inactive ───────────────────────────────────────────
function setActive(active) {
  isActive = active;
  inactiveOverlay.classList.toggle('hidden', active);
  speedSlider.disabled = !active;
  btnFwd.disabled  = !active;
  btnRev.disabled  = !active;
  hornBtn.disabled = !active;
  lightsBtn.disabled = !active;
  if (active) {
    connLight.className = 'status-light green';
    connText.textContent = 'DRIVING';
    queueBadge.textContent = 'YOUR TURN';
    startTimer(60);
    showToast("🟢 You're driving! 60 seconds on the clock.");
  } else {
    connLight.className = 'status-light amber';
    connText.textContent = 'WAITING';
  }
}

// ── Timer ─────────────────────────────────────────────────────
function startTimer(secs) {
  clearInterval(timerIv);
  timerSecs = secs;
  renderTimer();
  timerIv = setInterval(() => {
    timerSecs--;
    renderTimer();
    timerDisplay.classList.toggle('warn', timerSecs <= 10);
    if (timerSecs <= 0) clearInterval(timerIv);
  }, 1000);
}
function renderTimer() {
  const m = String(Math.floor(timerSecs / 60)).padStart(2, '0');
  const s = String(timerSecs % 60).padStart(2, '0');
  timerDisplay.textContent = m + ':' + s;
}

// ── Queue display ─────────────────────────────────────────────
function renderQueue(length, myPos) {
  queueCount.textContent = length;
  queueBadge.textContent = isActive ? 'YOUR TURN' : `QUEUE: ${length}`;
  queueSlots.innerHTML = '';
  const show = Math.min(length, 8);
  for (let i = 0; i < show; i++) {
    const slot = document.createElement('div');
    slot.className = 'q-slot ' + (i === 0 ? 'active' : i === myPos - 1 ? 'you' : 'waiting');
    slot.textContent = i === 0 ? '▶' : i === myPos - 1 ? 'YOU' : i + 1;
    queueSlots.appendChild(slot);
  }
  if (length > 8) {
    const more = document.createElement('div');
    more.className = 'q-slot waiting';
    more.textContent = '+' + (length - 8);
    queueSlots.appendChild(more);
  }
  if (!isActive) {
    queuePos.textContent = `#${myPos}`;
    queueEta.textContent = myPos === 1 ? 'Up next!' : `~${myPos - 1} turn(s) to wait`;
    queueNextText.textContent = myPos === 1 ? 'You are next!' : `~${Math.ceil((myPos-1))} min wait`;
  } else {
    queueNextText.textContent = 'Driving now';
  }
}

// ── Toast ─────────────────────────────────────────────────────
let toastTimeout;
function showToast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  clearTimeout(toastTimeout);
  toastTimeout = setTimeout(() => toastEl.classList.remove('show'), 3500);
}

// ── Timecode ──────────────────────────────────────────────────
setInterval(() => {
  const now = new Date();
  const tc = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
  document.getElementById('tc1').textContent = tc;
  document.getElementById('tc2').textContent = tc;
}, 1000);

// ── Socket events ─────────────────────────────────────────────
socket.on('connect', () => {
  connLight.className = 'status-light amber';
  connText.textContent = 'CONNECTED';
  showToast('Connected to server');
});

socket.on('disconnect', () => {
  connLight.className = 'status-light red';
  connText.textContent = 'DISCONNECTED';
  showToast('⚠️ Connection lost — reconnecting…');
  setActive(false);
});

socket.on('queue:active', ({ durationMs }) => {
  setActive(true);
});

socket.on('queue:slotended', () => {
  setActive(false);
  updateSpeed(0, false);
  showToast('⏱ Your slot ended — back in the queue');
});

socket.on('queue:warning', ({ secondsLeft }) => {
  showToast(`⚠️ ${secondsLeft}s left — get ready to hand over!`);
});

socket.on('queue:full', () => {
  showToast('😔 Queue is full — try again later');
});

socket.on('queue:estop', () => {
  updateSpeed(0, false);
  setActive(false);
  showToast('🛑 Emergency stop activated');
});

socket.on('queue:notactive', () => {
  showToast('Not your turn');
});

socket.on('queue:state', ({ queueLength, myPosition, msLeft, viewerCount: vc }) => {
  viewerCount.textContent = vc || '--';
  renderQueue(queueLength, myPosition);
  if (!isActive && msLeft > 0) startTimer(Math.ceil(msLeft / 1000));
});

socket.on('train:update', ({ speed: s, direction: d }) => {
  updateSpeed(s, false);
  setDirection(d);
});

// ── Camera frame via Socket.io ────────────────────────────────
socket.on('cam:frame', (data) => {
  cam2feed.src = 'data:' + data.type + ';base64,' + data.data;
  ns2.style.opacity = '0';
});

// ── Controls ──────────────────────────────────────────────────
speedSlider.addEventListener('input', () => {
  if (isActive) updateSpeed(+speedSlider.value);
});

btnFwd.addEventListener('click', () => {
  if (!isActive) return;
  updateSpeed(0);
  setTimeout(() => setDirection('fwd'), 50);
  setTimeout(() => socket.emit('train:control', { speed: 0, direction: 'fwd' }), 50);
});

btnRev.addEventListener('click', () => {
  if (!isActive) return;
  updateSpeed(0);
  setTimeout(() => setDirection('rev'), 50);
  setTimeout(() => socket.emit('train:control', { speed: 0, direction: 'rev' }), 50);
});

estopBtn.addEventListener('click', () => {
  updateSpeed(0);
  estopBtn.style.transform = 'translateY(4px)';
  setTimeout(() => estopBtn.style.transform = '', 200);
  socket.emit('train:control', { speed: 0, direction });
});

hornBtn.addEventListener('click', () => {
  if (!isActive) return;
  hornBtn.style.background = '#f0b429';
  setTimeout(() => hornBtn.style.background = '', 180);
  socket.emit('train:function', { fn: 'horn' });
});

lightsBtn.addEventListener('click', () => {
  if (!isActive) return;
  lightsOn = !lightsOn;
  lightsBtn.classList.toggle('lit', lightsOn);
  socket.emit('train:function', { fn: 'lights', state: lightsOn });
});

// ── Dial drag ─────────────────────────────────────────────────
let dragging = false, dragStartY = 0, dragStartSpeed = 0;
dialOuter.addEventListener('mousedown',  e => { if (!isActive) return; dragging = true; dragStartY = e.clientY; dragStartSpeed = speed; });
dialOuter.addEventListener('touchstart', e => { if (!isActive) return; dragging = true; dragStartY = e.touches[0].clientY; dragStartSpeed = speed; }, { passive: true });
document.addEventListener('mousemove',  e => { if (dragging) updateSpeed(dragStartSpeed + (dragStartY - e.clientY) / 1.5); });
document.addEventListener('touchmove',  e => { if (dragging) updateSpeed(dragStartSpeed + (dragStartY - e.touches[0].clientY) / 1.5); }, { passive: true });
document.addEventListener('mouseup',   () => dragging = false);
document.addEventListener('touchend',  () => dragging = false);

// ── Ping display ──────────────────────────────────────────────
setInterval(() => {
  const start = Date.now();
  socket.emit('ping', {}, () => {
    pingEl.textContent = Date.now() - start;
  });
}, 5000);
</script>
</body>
</html>
